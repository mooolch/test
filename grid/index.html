                <div class="page-main__container">
                    <div class="page-main__info">
                        <div class="page-main__content">
                            <a class="page-main__showreel" href="#">Play showreel</a>
                            <h1 class="page-main__title">Enjoy studying

                            <div class="page-main__actions">
                                <a class="button button--transparent" href="#">About us</a>

                        <div class="statistics__item">

                        <div class="statistics__circle"></div>
                        <div class="statistics__item">
                            <div class="statistics__number">16</div>
                            <div class="statistics__text">Qualified tutors</div>
                        </div>
                        <div class="statistics__circle"></div>
                        <div class="statistics__item">
                            <div class="statistics__number">5</div>
